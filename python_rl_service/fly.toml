# fly.toml app configuration file generated for rl-service on 2026-03-07T12:12:36+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'rl-service'
primary_region = 'sin'

[build]

[env]
  PORT = '8000'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[checks]
  [checks.health]
    port = 8000
    type = 'http'
    interval = '30s'
    timeout = '5s'
    path = '/rl/health'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adaptive Optimizer Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 18px;
      opacity: 0.9;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }

    .card h2 {
      font-size: 24px;
      margin-bottom: 16px;
      color: #333;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }

    .status-item {
      padding: 16px;
      background: #f7fafc;
      border-radius: 8px;
      border-left: 4px solid #667eea;
    }

    .status-label {
      font-size: 12px;
      color: #718096;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .status-value {
      font-size: 24px;
      font-weight: 700;
      color: #2d3748;
    }

    .button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      background: #667eea;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .button:hover {
      background: #5568d3;
      transform: translateY(-2px);
    }

    .button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .button-secondary {
      background: #e2e8f0;
      color: #4a5568;
    }

    .button-secondary:hover {
      background: #cbd5e0;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .settings-list {
      list-style: none;
    }

    .settings-item {
      padding: 12px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .settings-item:last-child {
      border-bottom: none;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #718096;
    }

    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .success {
      padding: 12px;
      background: #d4edda;
      color: #155724;
      border-radius: 8px;
      margin-top: 16px;
    }

    .error {
      padding: 12px;
      background: #f8d7da;
      color: #721c24;
      border-radius: 8px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚀 Adaptive Optimizer</h1>
      <p>ML + RL + User Feedback Dashboard</p>
    </div>

    <div id="app">
      <div class="loading">
        <div class="spinner"></div>
        <div>Loading dashboard...</div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:5000/api';
    const USER_ID = 'user_123';

    let dashboardData = null;

    async function init() {
      try {
        // Test API connection
        const healthResponse = await fetch(`${API_URL}/health`);
        const health = await healthResponse.json();
        
        if (!health.success) {
          throw new Error('API not healthy');
        }

        // Load dashboard data
        await loadDashboard();
        renderDashboard();
      } catch (error) {
        console.error('Init error:', error);
        document.getElementById('app').innerHTML = `
          <div class="card">
            <div class="error">
              <strong>Error:</strong> Could not connect to backend API.<br>
              Make sure the backend is running at ${API_URL}
            </div>
          </div>
        `;
      }
    }

    async function loadDashboard() {
      const response = await fetch(`${API_URL}/users/${USER_ID}/dashboard-data`);
      const result = await response.json();
      
      if (result.success) {
        dashboardData = result.data;
      } else {
        throw new Error(result.error);
      }
    }

    function renderDashboard() {
      const { user, undoRedoStatus, analytics } = dashboardData;

      document.getElementById('app').innerHTML = `
        <!-- Status -->
        <div class="card">
          <h2>System Status</h2>
          <div class="status-grid">
            <div class="status-item">
              <div class="status-label">User ID</div>
              <div class="status-value">${user.userId}</div>
            </div>
            <div class="status-item">
              <div class="status-label">ML Confidence</div>
              <div class="status-value">${(user.mlProfile?.mergedProfile?.confidence || 0).toFixed(2)}</div>
            </div>
            <div class="status-item">
              <div class="status-label">Total Events</div>
              <div class="status-value">${analytics.totalEvents}</div>
            </div>
            <div class="status-item">
              <div class="status-label">Feedback Given</div>
              <div class="status-value">${analytics.feedbackStats.total}</div>
            </div>
          </div>
        </div>

        <!-- Current Settings -->
        <div class="card">
          <h2>Current Settings</h2>
          <ul class="settings-list">
            ${Object.entries(user.currentSettings || {}).map(([key, value]) => `
              <li class="settings-item">
                <span><strong>${formatKey(key)}:</strong></span>
                <span>${value}</span>
              </li>
            `).join('')}
          </ul>
        </div>

        <!-- Actions -->
        <div class="card">
          <h2>Actions</h2>
          <div class="button-group">
            <button class="button" onclick="runOptimization()">
              ⚡ Run Optimization
            </button>
            <button class="button button-secondary" onclick="undo()" ${!undoRedoStatus.canUndo ? 'disabled' : ''}>
              ↶ Undo
            </button>
            <button class="button button-secondary" onclick="redo()" ${!undoRedoStatus.canRedo ? 'disabled' : ''}>
              ↷ Redo
            </button>
            <button class="button button-secondary" onclick="reset()">
              🔄 Reset
            </button>
          </div>
          <div id="actionMessage"></div>
        </div>

        <!-- Analytics -->
        <div class="card">
          <h2>Analytics (Last 7 Days)</h2>
          <div class="status-grid">
            <div class="status-item" style="border-left-color: #48bb78;">
              <div class="status-label">Positive</div>
              <div class="status-value">${analytics.feedbackStats.positive}</div>
            </div>
            <div class="status-item" style="border-left-color: #ecc94b;">
              <div class="status-label">Neutral</div>
              <div class="status-value">${analytics.feedbackStats.neutral}</div>
            </div>
            <div class="status-item" style="border-left-color: #fc8181;">
              <div class="status-label">Negative</div>
              <div class="status-value">${analytics.feedbackStats.negative}</div>
            </div>
            <div class="status-item" style="border-left-color: #667eea;">
              <div class="status-label">Avg Rating</div>
              <div class="status-value">${analytics.feedbackStats.averageRating.toFixed(1)}</div>
            </div>
          </div>
        </div>
      `;
    }

    function formatKey(key) {
      return key.replace(/([A-Z])/g, ' $1').replace(/^./, str => str.toUpperCase());
    }

    async function runOptimization() {
      showMessage('Running optimization...', 'info');
      try {
        // This would call your optimization engine
        // For now, just show a message
        showMessage('Optimization complete! (Integration with engine needed)', 'success');
      } catch (error) {
        showMessage('Error: ' + error.message, 'error');
      }
    }

    async function undo() {
      showMessage('Undoing...', 'info');
      try {
        const response = await fetch(`${API_URL}/users/${USER_ID}/undo`, {
          method: 'POST'
        });
        const result = await response.json();
        
        if (result.success) {
          showMessage('Successfully undone!', 'success');
          await loadDashboard();
          renderDashboard();
        } else {
          showMessage(result.message, 'error');
        }
      } catch (error) {
        showMessage('Error: ' + error.message, 'error');
      }
    }

    async function redo() {
      showMessage('Redoing...', 'info');
      try {
        const response = await fetch(`${API_URL}/users/${USER_ID}/redo`, {
          method: 'POST'
        });
        const result = await response.json();
        
        if (result.success) {
          showMessage('Successfully redone!', 'success');
          await loadDashboard();
          renderDashboard();
        } else {
          showMessage(result.message, 'error');
        }
      } catch (error) {
        showMessage('Error: ' + error.message, 'error');
      }
    }

    async function reset() {
      if (!confirm('Reset all settings to default?')) return;
      
      showMessage('Resetting...', 'info');
      try {
        const response = await fetch(`${API_URL}/users/${USER_ID}/reset`, {
          method: 'POST'
        });
        const result = await response.json();
        
        if (result.success) {
          showMessage('Settings reset!', 'success');
          await loadDashboard();
          renderDashboard();
        }
      } catch (error) {
        showMessage('Error: ' + error.message, 'error');
      }
    }

    function showMessage(message, type) {
      const messageDiv = document.getElementById('actionMessage');
      const className = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
      messageDiv.innerHTML = `<div class="${className}">${message}</div>`;
      
      if (type !== 'info') {
        setTimeout(() => {
          messageDiv.innerHTML = '';
        }, 3000);
      }
    }

    // Initialize
    init();

    // Auto-refresh every 30 seconds
    setInterval(async () => {
      await loadDashboard();
      renderDashboard();
    }, 30000);
  </script>
</body>
</html>
